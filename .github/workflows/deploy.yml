name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      backend:
        description: "Deploy backend"
        type: boolean
        default: true
      frontend:
        description: "Deploy frontend"
        type: boolean
        default: true
      dashboard:
        description: "Deploy dashboard"
        type: boolean
        default: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"

          if [[ -z "$before_sha" || "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            mapfile -t changed_files < <(git ls-tree -r --name-only "$head_sha")
          else
            mapfile -t changed_files < <(git diff --name-only "$before_sha" "$head_sha")
          fi

          backend=false
          frontend=false
          dashboard=false

          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/backend/*|packages/contracts/*|packages/design/*|packages/ui/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|zerops.yml|drizzle.config.ts)
                backend=true ;;
            esac
            case "$file" in
              apps/frontend/*|packages/contracts/*|packages/design/*|packages/ui/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|zerops.yml)
                frontend=true ;;
            esac
            case "$file" in
              apps/dashboard/*|packages/contracts/*|packages/design/*|packages/ui/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|zerops.yml)
                dashboard=true ;;
            esac
          done

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "dashboard=$dashboard"
          } >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || (github.event_name == 'workflow_dispatch' && inputs.backend)
    steps:
      - uses: actions/checkout@v6
      - uses: zeropsio/actions@v1.0.1
        with:
          access-token: ${{ secrets.ZEROPS_TOKEN }}
          service-id: ${{ secrets.ZEROPS_BACKEND_SERVICE_ID }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || (github.event_name == 'workflow_dispatch' && inputs.frontend)
    steps:
      - uses: actions/checkout@v6
      - uses: zeropsio/actions@v1.0.1
        with:
          access-token: ${{ secrets.ZEROPS_TOKEN }}
          service-id: ${{ secrets.ZEROPS_FRONTEND_SERVICE_ID }}

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true' || (github.event_name == 'workflow_dispatch' && inputs.dashboard)
    steps:
      - uses: actions/checkout@v6
      - uses: zeropsio/actions@v1.0.1
        with:
          access-token: ${{ secrets.ZEROPS_TOKEN }}
          service-id: ${{ secrets.ZEROPS_DASHBOARD_SERVICE_ID }}

  smoke-prod:
    name: Smoke Production
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-dashboard]
    if: |
      always() &&
      needs.deploy-backend.result != 'failure' &&
      needs.deploy-frontend.result != 'failure' &&
      needs.deploy-dashboard.result != 'failure' &&
      (needs.deploy-backend.result == 'success' ||
       needs.deploy-frontend.result == 'success' ||
       needs.deploy-dashboard.result == 'success')
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/smoke-prod.sh
        env:
          WEB_BASE_URL: https://layered.work
          DASHBOARD_BASE_URL: https://dashboard.layered.work
          API_BASE_URL: https://api.layered.work
